<!DOCTYPE html>
<html lang="en" data-theme="light">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GitHub Issues Tracker</title>
  
  
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-200">

   
    <div class="flex justify-center mb-4">
      <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 object-contain">
    </div>

    
    <h1 class="text-2xl font-bold text-center text-slate-800">
      GitHub Issues Tracker
    </h1>
    <p class="text-center text-slate-500 text-sm mb-6">
      Sign in to manage your issues
    </p>

    <div class="mb-4">
      <label class="text-sm font-medium text-slate-700">Username</label>
      <input
        id="username"
        type="text"
        placeholder="Enter Username"
        class="input input-bordered w-full mt-2 bg-white"
      />
      <p class="text-xs text-blue-600 mt-1">Default: admin</p>
    </div>

   
    <div class="mb-6">
      <label class="text-sm font-medium text-slate-700">Password</label>
      <input
        id="password"
        type="password"
        placeholder="Enter Password"
        class="input input-bordered w-full mt-2 bg-white"
      />
      <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
    </div>

    <p id="error" class="text-red-500 text-sm hidden mb-3 text-center">
      Invalid username or password
    </p>

    <button
      id="loginBtn"
      class="btn bg-[#5B21B6] hover:bg-[#4C1D95] text-white w-full border-0 mb-4"
    >
      Sign In
    </button>

   
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-slate-500">OR</span>
      </div>
    </div>

    <div class="bg-slate-50 rounded-lg p-4 border border-slate-200">
      <p class="text-center text-sm text-slate-500 mb-2">Demo Credentials:</p>
      <div class="text-sm">
        <p class="text-slate-700"><span class="font-semibold">Username:</span> admin</p>
        <p class="text-slate-700"><span class="font-semibold">Password:</span> admin123</p>
      </div>
    </div>

  </div>

  <script src="login.js"></script>

</body>
</html>
